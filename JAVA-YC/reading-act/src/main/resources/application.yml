server:
  port: 8080

spring:
  profiles:
    active: properties
  main:
    allow-circular-references: true

    # ... 其他不变
  datasource:
    driver-class-name: ${ebook.datasource.driver-class-name}
    url: jdbc:mysql://${ebook.datasource.host}:${ebook.datasource.port}/${ebook.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${ebook.datasource.username}
    password: ${ebook.datasource.password}

  data:
    redis:
      host: ${ebook.redis.host}
      port: ${ebook.redis.port}
      database: ${ebook.redis.database}
# 修正：改为 mybatis-plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ebook.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      ebook:
        mapper: debug
        service: info
        controller: info

ebook:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: xiaozhou
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

    #    设置jwt签名加密时使用的密钥
    user-secret-key: dazhou
    # 设置jwt过期时间
    user-ttl: 7200000
    # 设置前端传递过来的令牌名称
    user-token-name: Authentication
